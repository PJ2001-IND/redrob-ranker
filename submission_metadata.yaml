ai_usage_summary: |
  Built entirely with Antigravity AI. Pipeline handles hard filtering of honeypots, BM25 keyword scoring, heuristic behavioral scoring, and semantic local CPU re-ranking via sentence-transformers.

methodology_summary: |
  9-stage Omega Architecture running natively on CPU.
  1. Deep NLP Pipeline: Bi-Encoder (MiniLM) semantic retrieval + Cross-Encoder (MS-Marco) absolute reranking.
  2. Aggregation: Reciprocal Rank Fusion (RRF) for mathematical sorting.
  3. Psychological Profiling: Heuristic extraction of Big-5 (OCEAN) traits, Dunning-Kruger modesty, and Leadership bias.
  4. Omega Predictors: Flight-Risk, Salary estimators, and Resume Fluff detectors.

