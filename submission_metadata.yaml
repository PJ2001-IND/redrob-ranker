ai_usage_summary: |
  Built entirely with AI pairing. Pipeline handles hard filtering, BM25, and semantic local CPU re-ranking via Cross-Encoders (sentence-transformers), plus 7 heuristic Omega Predictors and Big-5 Personality Synthesis.

methodology_summary: |
  9-Stage Omni-Architecture running entirely on CPU under 30 seconds. 
  1. Two-Stage NLP: Bi-Encoder (all-MiniLM-L6-v2) -> Cross-Encoder (ms-marco-Tiny).
  2. Aggregation: Reciprocal Rank Fusion (RRF).
  3. Psychological Profiling: Heuristic extraction of Big-5 Personality, Dunning-Kruger modesty, and Leadership bias.
  4. Omega Predictors: Time-to-Hire, Retention Probability, and Flight-Risk.

