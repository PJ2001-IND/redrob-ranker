ai_usage_summary: |
  Built entirely with Antigravity AI. Pipeline handles hard filtering of honeypots, BM25 keyword scoring, heuristic behavioral scoring, and semantic local CPU re-ranking via sentence-transformers.

methodology_summary: |
  4-stage pipeline running entirely on CPU under 5 minutes. 
  1. Hard filtering: Drops honeypots (impossible skill duration, wrong titles) and inactive users.
  2. BM25 / Behavioral: Fast keyword match on JD terms + recruiter response signals.
  3. Semantic Re-rank: Top 1000 rescored with MiniLM-L6-v2 cosine similarity against JD embeddings.
  4. Reasoning Generator: Dynamic factual templates to describe candidate fit.

